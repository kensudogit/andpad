# GraphQL schema ? Go (gqlgen). Run: go generate ./...
schema:
  - ../graphql/schema.graphql

exec:
  filename: internal/graph/generated/generated.go
  package: generated

model:
  filename: internal/graph/generated/models_gen.go
  package: generated

resolver:
  layout: follow-schema
  dir: internal/graph
  package: graph
  filename_template: "{name}.resolvers.go"

models:
  ID:
    model:
      - github.com/99designs/gqlgen/graphql.ID
      - github.com/99designs/gqlgen/graphql.Int
      - github.com/99designs/gqlgen/graphql.Int64
      - github.com/99designs/gqlgen/graphql.Int32
  Int:
    model:
      - github.com/99designs/gqlgen/graphql.Int
      - github.com/99designs/gqlgen/graphql.Int64
      - github.com/99designs/gqlgen/graphql.Int32
  SkillLevel:
    model: github.com/pluszero/dental-video-api/internal/models.SkillLevel
  VideoCategory:
    model: github.com/pluszero/dental-video-api/internal/models.VideoCategory
  LearningActivityKind:
    model: github.com/pluszero/dental-video-api/internal/models.LearningActivityKind

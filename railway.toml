# ANDPAD — unified Railway deploy (git push → auto build)
#
# Service Settings (CRITICAL — empty archive / missing Dockerfile if wrong):
#   Root Directory     ->  CLEAR / EMPTY (must be repo root)
#   Config file path   ->  /railway.toml
#   Dockerfile Path    ->  CLEAR in UI (use this file only; UI override can empty the context)
#
# Required Variables:
#   DATABASE_URL  — Reference from Postgres plugin
#   JWT_SECRET    — long random string (not an API key)
#
# Do NOT set API_URL.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
numReplicas = 1

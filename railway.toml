# ANDPAD — unified Railway deploy (git push → auto build)
#
# Service Settings:
#   Root Directory     ->  leave EMPTY (repo root)
#   Config file path   ->  /railway.toml
#
# Required Variables on THIS service (not Postgres):
#   DATABASE_URL  — Reference from Postgres plugin
#   JWT_SECRET    — long random string (not an API key)
#
# Do NOT set API_URL. CORS_ORIGINS / APP_PUBLIC_URL auto-fill from RAILWAY_PUBLIC_DOMAIN.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["frontend/**", "backend/**", "graphql/**", "scripts/**", "Dockerfile", "Dockerfile.unified"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
numReplicas = 1
